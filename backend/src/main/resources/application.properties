server.port=${PORT:9090}
server.servlet.context-path=/

# ── Database ──────────────────────────────────────────────────────
# Railway injects: MYSQLHOST, MYSQLPORT, MYSQLDATABASE, MYSQLUSER, MYSQLPASSWORD
# Local fallback:  localhost / sevengears_db / root / (no password)
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:sevengears_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Kolkata

logging.level.com.sevengears=INFO

# ── File Upload ───────────────────────────────────────────────────
upload.dir=${UPLOAD_DIR:./uploads}
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=50MB

# ── WhatsApp Gateway ──────────────────────────────────────────────
whatsapp.gateway-url=${WHATSAPP_URL:http://localhost:9091}
