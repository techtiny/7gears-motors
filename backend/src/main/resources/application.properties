server.port=${PORT:9090}

# ── Database ──────────────────────────────────────────────────────
# On Railway: MYSQLHOST, MYSQLPORT, MYSQLDATABASE, MYSQLUSER, MYSQLPASSWORD are set automatically
# Locally:    falls back to localhost/sevengears_db/root
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:sevengears_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Kolkata

logging.level.com.sevengears=INFO

# ── File Upload ───────────────────────────────────────────────────
upload.dir=${UPLOAD_DIR:./uploads}
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=50MB

# ── WhatsApp Gateway ──────────────────────────────────────────────
# On Railway: set WHATSAPP_URL to your WhatsApp service internal URL
# Locally:    uses localhost:9091
whatsapp.gateway-url=${WHATSAPP_URL:http://localhost:9091}
